<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dev Tools Practice</title>
  </head>
  <body>

    <!--
      EXERCISE: Open this page in Chrome or Firefox.
      Right-click any element and choose "Inspect" (or press F12).

      Things to try in the Elements tab:
        1. Hover over HTML tags — see them highlight on the page.
        2. Double-click text to edit it live in the browser.
        3. Find the <h1> — what attributes does it have?
        4. Collapse/expand nested elements with the triangle arrow.
    -->

    <h1 id="page-title" class="main-heading">Inspect Me!</h1>

    <p class="intro">This page is made for poking around in the browser dev tools.</p>

    <ul>
      <li><a href="https://www.example.com">A link inside a list</a></li>
      <li><strong>Bold text</strong> inside a list item</li>
      <li><em>Italic text</em> inside a list item</li>
    </ul>

    <img src="https://placehold.co/300x150" alt="Placeholder" width="300" height="150" />

  </body>
</html>
