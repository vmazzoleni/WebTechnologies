<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Links</title>
  </head>
  <body>

    <!-- Absolute URL — full address, goes to another site -->
    <a href="https://www.wikipedia.org">Go to Wikipedia</a>

    <!-- Opens in a new tab -->
    <a href="https://www.wikipedia.org" target="_blank">Wikipedia (new tab)</a>

    <!-- Relative URL — links to a file in the same folder -->
    <a href="05-headings.html">Go to the Headings example</a>

    <!-- Anchor link — jumps to an element with that id on the same page -->
    <a href="#section2">Jump to Section 2</a>

    <br /><br />

    <h2 id="section2">Section 2</h2>
    <p>You jumped here via an anchor link.</p>

  </body>
</html>
