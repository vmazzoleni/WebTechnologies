<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Lists</title>
  </head>
  <body>

    <!-- Unordered list — bullet points, order doesn't matter -->
    <ul>
      <li>Tomatoes</li>
      <li>Onions</li>
      <li>Garlic</li>
    </ul>

    <!-- Ordered list — numbered, order matters -->
    <ol>
      <li>Chop the onions</li>
      <li>Fry in oil</li>
      <li>Add tomatoes</li>
    </ol>

    <!-- Nested list — a list inside a list item -->
    <ul>
      <li>Vegetables
        <ul>
          <li>Carrot</li>
          <li>Potato</li>
        </ul>
      </li>
      <li>Fruits</li>
    </ul>

  </body>
</html>
