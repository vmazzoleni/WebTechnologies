<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Nesting</title>
  </head>
  <body>

    <!-- Good: tags opened and closed in the right order -->
    <p>This is <strong>bold</strong> and this is <em>italic</em>.</p>

    <!-- Good: child fully inside parent -->
    <ul>
      <li>First item</li>
      <li>Second item</li>
    </ul>

    <!-- Bad: overlapping tags — never do this -->
    <!-- <p>This is <strong>wrong</p></strong> -->

  </body>
</html>
