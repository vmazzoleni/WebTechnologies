<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Images</title>
</head>

<body>

  <!-- src — where the image lives (URL or relative path)  -->
  <!-- alt — shown if image fails to load, required for accessibility -->
  <img src="https://placehold.co/400x200" alt="A grey placeholder image" />

  <!-- Local image -->
  <img src="./images/coconut-soup.webp" alt="A local image of a soup with coconut milk" />


</body>

</html>
