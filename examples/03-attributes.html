<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Attributes</title>
  </head>
  <body>

    <!-- Attributes live inside the opening tag: name="value" -->

    <p id="intro">I have an id.</p>

    <p class="highlight">I have a class.</p>

    <p title="Shown on hover">Hover over me.</p>

    <p id="main" class="highlight">I have both an id and a class.</p>

  </body>
</html>
