<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Linking CSS and JS</title>

  <!-- Link to an external CSS file — goes in the <head> -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <h1>Styled with CSS, powered by JS</h1>
  <p id="message" class="msg">This text is styled from an external CSS file.</p>
  <button id="btn" class="btn">Click me</button>

  <!-- Link to an external JS file — goes at the end of <body> -->
  <script src="script.js"></script>
</body>

</html>
