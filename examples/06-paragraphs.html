<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Paragraphs</title>
  </head>
  <body>

    <p>This is the first paragraph. The browser adds space above and below it automatically.</p>

    <p>This is the second paragraph.      Extra spaces
      and line breaks in the source
      are ignored by the browser.</p>

    <p>Use <br /> to force a line break<br />inside a paragraph.</p>

  </body>
</html>
